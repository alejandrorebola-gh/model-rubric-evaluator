<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Model Rubric Evaluator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background: #fafafa; color: #222; }
    h1 { margin-bottom: 8px; }
    textarea { width: 100%; height: 280px; font-family: monospace; font-size: 14px; padding: 10px; box-sizing: border-box; }
    button { margin-top: 12px; margin-right: 10px; padding: 10px 16px; cursor: pointer; }
    select { padding: 5px; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; font-size: 13px; }
    th, td { border: 1px solid #ccc; padding: 8px; vertical-align: top; text-align: left; }
    th { background: #f0f0f0; text-align: center; }
    tfoot td { background: #f7f7f7; font-weight: bold; text-align: center; }
    .num { width: 55px; text-align: center; }
    .criteria { min-width: 320px; max-width: 520px; }
    .points { width: 70px; text-align: center; }
    .logic { width: 115px; text-align: center; }
    .conditions { min-width: 260px; max-width: 330px; }
    .eval { width: 70px; text-align: center; font-weight: bold; }
    .notes { min-width: 220px; }
    .note-box { width: 100%; height: 70px; box-sizing: border-box; font-size: 13px; resize: vertical; }
    .condition-item { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 6px; line-height: 1.25; }
    .condition-item input { margin-top: 2px; flex-shrink: 0; }
    .criterion-main { font-weight: bold; margin-bottom: 8px; }
    .conditions-label { font-size: 12px; color: #555; margin-bottom: 6px; font-style: italic; }
    .score-one { background: #d4edda; }
    .score-zero { background: #f8d7da; }
    .error { color: red; font-weight: bold; margin-top: 15px; }
    .screen-only { display: inline-block; }
    .print-only { display: none; }

    @media print {
      @page {
        size: landscape;
        margin: 0.35in;
      }

      body {
        margin: 0;
        background: white;
        color: black;
      }

      .screen-only,
      #criteriaInput,
      #inputInstructions,
      #generateButton,
      .print-hide {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }

      table {
        width: 100%;
        font-size: 10px;
        page-break-inside: auto;
      }

      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }

      th, td {
        padding: 4px;
      }

      .criteria {
        min-width: 200px;
        max-width: 260px;
      }

      .conditions {
        min-width: 180px;
        max-width: 220px;
      }

      .notes {
        min-width: 140px;
      }

      .condition-item input {
        transform: scale(0.9);
      }

      .note-box {
        display: none;
      }

      .note-print {
        display: block !important;
        white-space: pre-wrap;
        font-size: 10px;
      }

      select {
        border: none;
        background: transparent;
        appearance: none;
        -webkit-appearance: none;
        font-weight: bold;
      }
    }
  </style>
</head>

<body>
<h1>Model Rubric Evaluator</h1>

<p id="inputInstructions">
  Paste the rubric criteria below. Each criterion should start with something like
  <b>[+7]</b> or <b>[-10]</b>. Conditions are extracted from the text after <b>hold:</b>.
</p>

<textarea id="criteriaInput"></textarea>
<br>

<button id="generateButton" onclick="generateTable()">Generate Table</button>

<div id="output"></div>

<script>
function generateTable() {
  const input = document.getElementById("criteriaInput").value.trim();
  const output = document.getElementById("output");

  output.innerHTML = "";

  if (!input) {
    output.innerHTML = "<p class='error'>Please paste criteria first.</p>";
    return;
  }

  const regex = /\[([+-]?\d+)\]\s*([\s\S]*?)(?=\s*\[[+-]?\d+\]\s*|$)/g;

  let criteria = [];
  let match;

  while ((match = regex.exec(input)) !== null) {
    const fullText = match[2].trim();

    if (fullText.length > 0) {
      criteria.push({
        points: Number(match[1]),
        fullText: fullText,
        mainText: extractMainCriterion(fullText),
        conditions: extractConditions(fullText),
        defaultMode: inferDefaultMode(fullText)
      });
    }
  }

  if (criteria.length === 0) {
    output.innerHTML =
      "<p class='error'>No criteria found. Make sure each criterion starts with something like [+7] or [-10].</p>";
    return;
  }

  let html = `
  <div class="print-only">
    <p><b>Exported evaluation table</b></p>
  </div>

  <table id="evaluationTable">
    <thead>
      <tr>
        <th class="num">#</th>
        <th class="criteria">Criterion</th>
        <th class="points">Points</th>
        <th class="logic">Logic</th>
        <th class="conditions">GPT conditions</th>
        <th class="eval">GPT eval</th>
        <th class="conditions">Gemini conditions</th>
        <th class="eval">Gemini eval</th>
        <th class="conditions">Claude conditions</th>
        <th class="eval">Claude eval</th>
        <th class="notes">Notes</th>
      </tr>
    </thead>
    <tbody>`;

  criteria.forEach((item, index) => {
    html += `
      <tr data-row="${index}">
        <td class="num">${index + 1}</td>
        <td class="criteria">
          <div class="criterion-main">${escapeHtml(item.mainText)}</div>
          ${item.conditions.length > 0
            ? "<div class='conditions-label'>Conditions after hold:</div>"
            : "<div class='conditions-label'>No conditions found; use the single checkbox.</div>"
          }
        </td>
        <td class="points">${item.points}</td>

        <td class="logic">
          <select class="logic-select" onchange="recalculateRow(${index})">
            <option value="AND" ${item.defaultMode === "AND" ? "selected" : ""}>AND / all</option>
            <option value="OR" ${item.defaultMode === "OR" ? "selected" : ""}>OR / at least one</option>
          </select>
        </td>

        <td class="conditions">${buildChecklist("gpt", index, item.conditions)}</td>
        <td class="eval gpt-eval score-zero">0</td>

        <td class="conditions">${buildChecklist("gemini", index, item.conditions)}</td>
        <td class="eval gemini-eval score-zero">0</td>

        <td class="conditions">${buildChecklist("claude", index, item.conditions)}</td>
        <td class="eval claude-eval score-zero">0</td>

        <td class="notes">
          <textarea class="note-box" oninput="syncPrintableNotes(this)"></textarea>
          <div class="note-print print-only"></div>
        </td>
      </tr>`;
  });

  html += `
    </tbody>

    <tfoot>
      <tr>
        <td colspan="5">Weighted total</td>
        <td id="gptTotal" class="eval">0.00</td>
        <td></td>
        <td id="geminiTotal" class="eval">0.00</td>
        <td></td>
        <td id="claudeTotal" class="eval">0.00</td>
        <td></td>
      </tr>
      <tr>
        <td colspan="5">Percentage</td>
        <td id="gptPercent" class="eval">0.00%</td>
        <td></td>
        <td id="geminiPercent" class="eval">0.00%</td>
        <td></td>
        <td id="claudePercent" class="eval">0.00%</td>
        <td></td>
      </tr>
      <tr>
        <td colspan="5">Maximum possible score</td>
        <td id="maxScore" colspan="5" class="eval">0.00</td>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <button class="print-hide" onclick="recalculateAllRows()">Recalculate Totals</button>
  <button class="print-hide" onclick="downloadPDF()">Download PDF</button>
  `;

  output.innerHTML = html;
  recalculateAllRows();
}

function inferDefaultMode(text) {
  const lower = text.toLowerCase();

  if (lower.includes("at least one") || lower.includes("any of the following")) {
    return "OR";
  }

  return "AND";
}

function extractMainCriterion(text) {
  const marker = /hold\s*:/i;
  const match = text.search(marker);

  if (match >= 0) {
    return text.slice(0, match + text.match(marker)[0].length).trim();
  }

  return text.trim();
}

function extractConditions(text) {
  const marker = /hold\s*:/i;
  const matchIndex = text.search(marker);

  if (matchIndex < 0) {
    return [];
  }

  const matchedMarker = text.match(marker)[0];
  const conditionBlock = text.slice(matchIndex + matchedMarker.length).trim();

  const bulletRegex = /-\s+([\s\S]*?)(?=\s+-\s+|$)/g;

  let conditions = [];
  let match;

  while ((match = bulletRegex.exec(conditionBlock)) !== null) {
    const condition = match[1].trim();
    if (condition.length > 0) {
      conditions.push(condition);
    }
  }

  if (conditions.length === 0 && conditionBlock.length > 0) {
    conditions.push(conditionBlock);
  }

  return conditions;
}

function buildChecklist(model, rowIndex, conditions) {
  const list = conditions.length > 0
    ? conditions
    : ["Criterion satisfied"];

  return list.map((condition) => `
    <label class="condition-item">
      <input
        type="checkbox"
        class="${model}-check"
        data-model="${model}"
        data-row="${rowIndex}"
        onchange="updateRowScore(${rowIndex}, '${model}')"
      >
      <span>${escapeHtml(condition)}</span>
    </label>
  `).join("");
}

function getRowMode(row) {
  const select = row.querySelector(".logic-select");
  return select ? select.value : "AND";
}

function updateRowScore(rowIndex, model) {
  const row = document.querySelector(`tr[data-row="${rowIndex}"]`);
  if (!row) return;

  const checks = row.querySelectorAll(`.${model}-check`);
  const evalCell = row.querySelector(`.${model}-eval`);
  const mode = getRowMode(row);

  const checkedCount = Array.from(checks).filter(check => check.checked).length;
  const totalChecks = checks.length;

  let score = 0;

  if (mode === "AND") {
    score = totalChecks > 0 && checkedCount === totalChecks ? 1 : 0;
  } else {
    score = checkedCount > 0 ? 1 : 0;
  }

  evalCell.textContent = score;

  evalCell.classList.remove("score-one", "score-zero");
  evalCell.classList.add(score === 1 ? "score-one" : "score-zero");

  calculateTotals();
}

function recalculateRow(rowIndex) {
  updateRowScore(rowIndex, "gpt");
  updateRowScore(rowIndex, "gemini");
  updateRowScore(rowIndex, "claude");
  calculateTotals();
}

function recalculateAllRows() {
  const rows = document.querySelectorAll("tbody tr");

  rows.forEach(row => {
    const rowIndex = row.getAttribute("data-row");
    recalculateRow(rowIndex);
  });

  calculateTotals();
}

function calculateTotals() {
  const rows = document.querySelectorAll("tbody tr");

  let maxScore = 0;

  let gptTotal = 0;
  let geminiTotal = 0;
  let claudeTotal = 0;

  rows.forEach(row => {
    const points = Number(row.querySelector(".points").textContent) || 0;

    const gptScore = Number(row.querySelector(".gpt-eval").textContent) || 0;
    const geminiScore = Number(row.querySelector(".gemini-eval").textContent) || 0;
    const claudeScore = Number(row.querySelector(".claude-eval").textContent) || 0;

    gptTotal += points * gptScore;
    geminiTotal += points * geminiScore;
    claudeTotal += points * claudeScore;

    if (points > 0) {
      maxScore += points;
    }
  });

  const gptPercent = maxScore !== 0 ? 100 * gptTotal / maxScore : 0;
  const geminiPercent = maxScore !== 0 ? 100 * geminiTotal / maxScore : 0;
  const claudePercent = maxScore !== 0 ? 100 * claudeTotal / maxScore : 0;

  document.getElementById("gptTotal").textContent = gptTotal.toFixed(2);
  document.getElementById("geminiTotal").textContent = geminiTotal.toFixed(2);
  document.getElementById("claudeTotal").textContent = claudeTotal.toFixed(2);

  document.getElementById("gptPercent").textContent = gptPercent.toFixed(2) + "%";
  document.getElementById("geminiPercent").textContent = geminiPercent.toFixed(2) + "%";
  document.getElementById("claudePercent").textContent = claudePercent.toFixed(2) + "%";

  document.getElementById("maxScore").textContent = maxScore.toFixed(2);
}

function syncPrintableNotes(textarea) {
  const printable = textarea.parentElement.querySelector(".note-print");
  if (printable) {
    printable.textContent = textarea.value;
  }
}

function syncAllPrintableNotes() {
  document.querySelectorAll(".note-box").forEach(syncPrintableNotes);
}

function downloadPDF() {
  recalculateAllRows();
  syncAllPrintableNotes();

  // This opens the browser print dialog. Choose "Save as PDF".
  window.print();
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
</script>

</body>
</html>
